version: "3.9"

# Load .env.deploy for all variable substitutions:
#   docker compose --env-file .env.deploy up -d

services:
  # ── Ollama (local LLM — no API key needed) ─────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ${COMPOSE_PROJECT_NAME:-groweasy}-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Backend (Express API + SQLite) ─────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-groweasy}-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      - AI_MODEL=${AI_MODEL:-llama3.2}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-16000}
      - AI_BATCH_SIZE=${AI_BATCH_SIZE:-5}
      - AI_MAX_RETRIES=${AI_MAX_RETRIES:-3}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - UPLOAD_DIR=${UPLOAD_DIR:-uploads}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data

  # ── Frontend (Next.js standalone) ──────────────────────────────────────────
  frontend:
    build:
      context: ./nextjs-app
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js bundle at build time — must match what the
        # user's browser can reach (not the Docker internal network address).
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    container_name: ${COMPOSE_PROJECT_NAME:-groweasy}-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  backend_uploads:
  backend_data:

services:
  - type: web
    name: groweasy-backend
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free                  # free tier — 512 MB RAM (enough for Express + Groq)
    region: singapore           # change to: ohio / oregon / frankfurt / singapore
    branch: master

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

      # ── AI Provider (Groq) ─────────────────────────────────────
      # Set GROQ_API_KEY in Render Dashboard → Environment tab
      # Get a free key at: https://console.groq.com
      - key: GROQ_API_KEY
        sync: false             # set manually in Render dashboard (secret)

      - key: AI_MODEL
        value: llama-3.3-70b-versatile

      - key: AI_MAX_TOKENS
        value: 4000

      - key: AI_BATCH_SIZE
        value: 10

      - key: AI_MAX_RETRIES
        value: 3

      # ── Upload config ──────────────────────────────────────────
      - key: MAX_FILE_SIZE_MB
        value: 10

      - key: UPLOAD_DIR
        value: uploads
